<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>simran shah — books i'm reading</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Press Start 2P', monospace;
      background-image: url('bg.jpeg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.3);
      z-index: 0;
    }

    /* ── Scanline overlay ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.04) 2px,
        rgba(0, 0, 0, 0.04) 4px
      );
      pointer-events: none;
      z-index: 2;
    }

    canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 1;
    }
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      background: rgba(21, 34, 33, 0.78);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-top: 1px solid rgba(203, 216, 155, 0.25);
      border-bottom: 1px solid rgba(203, 216, 155, 0.25);
      padding: 0 2rem;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* ── Glitch on nav name ── */
    .nav-name {
      font-size: 0.45rem;
      letter-spacing: 0.18em;
      color: #c0b455;
      text-transform: uppercase;
      white-space: nowrap;
      animation: glitch-idle 8s infinite;
    }
    @keyframes glitch-idle {
      0%, 90%, 100% { text-shadow: none; transform: none; }
      91% { text-shadow: -2px 0 #86b084, 2px 0 #c0b455; transform: skewX(-2deg); }
      92% { text-shadow: 2px 0 #86b084, -2px 0 #c0b455; transform: skewX(2deg); }
      93% { text-shadow: none; transform: none; }
      94% { text-shadow: -1px 0 #c0b455; transform: skewX(-1deg); }
      95% { text-shadow: none; transform: none; }
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }
    .nav-links a {
      font-size: 0.42rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #cbd89b;
      text-decoration: none;
      position: relative;
      padding-bottom: 3px;
      transition: color 0.3s ease;
    }
    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0;
      width: 0%;
      height: 1px;
      background: #c0b455;
      transition: width 0.35s ease;
    }
    .nav-links a:hover { color: #c0b455; }
    .nav-links a:hover::after { width: 100%; }
    .nav-links a.active { color: #c0b455; }
    .nav-links a.active::after { width: 100%; background: #c0b455; opacity: 0.5; }

    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      z-index: 300;
    }
    .hamburger span {
      display: block;
      width: 22px;
      height: 2px;
      background: #cbd89b;
      transition: all 0.3s ease;
    }

    @media (max-width: 768px) {
      .hamburger { display: flex; }
      .nav-links {
        display: none;
        flex-direction: column;
        gap: 1.5rem;
        position: fixed;
        top: 48px; left: 0; right: 0;
        background: rgba(21, 34, 33, 0.97);
        padding: 2rem;
        z-index: 199;
        border-bottom: 1px solid rgba(203, 216, 155, 0.25);
      }
      .nav-links.open { display: flex; }
    }

    .container {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 100;
      text-align: center;
    }
    .status {
      display: inline-block;
      font-size: 0.6rem;
      color: #c0b455;
      padding: 0.6rem 1.2rem;
      border: 2px solid #c0b455;
      box-shadow: 4px 4px 0px #7c7938, -2px -2px 0px #86b084;
      letter-spacing: 0.12em;
      animation: flicker 4s step-end infinite;
    }
    @keyframes flicker {
      0%,94%,100% { opacity:1; }
      95% { opacity:0.3; }
      97% { opacity:1; }
      98% { opacity:0.2; }
      99% { opacity:1; }
    }

    .footer {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.42rem;
      letter-spacing: 0.1em;
      color: #5c896b;
      z-index: 100;
    }
    .footer a { color: #cbd89b; text-decoration: none; transition: color 0.3s; }
    .footer a:hover { color: #c0b455; }

    #transition-overlay {
      position: fixed;
      inset: 0;
      background: #0d1a14;
      z-index: 999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }
    #transition-overlay.fade-in { opacity: 1; pointer-events: all; }

    /* ── Loading Screen ── */
    #loading-screen {
      position: fixed;
      inset: 0;
      background: #0d1a14;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      transition: opacity 0.6s ease;
    }
    #loading-screen.hide {
      opacity: 0;
      pointer-events: none;
    }
    .loading-text {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.55rem;
      color: #c0b455;
      letter-spacing: 0.25em;
      text-transform: uppercase;
    }
    .loading-bar-wrap {
      width: 180px;
      height: 3px;
      background: rgba(203, 216, 155, 0.15);
    }
    .loading-bar {
      height: 100%;
      width: 0%;
      background: #c0b455;
      transition: width 0.2s ease;
    }
  </style>
</head>
<body>

  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loading-text" id="scramble-text">LOADING</div>
    <div class="loading-bar-wrap">
      <div class="loading-bar" id="loading-bar"></div>
    </div>
  </div>

  <div id="transition-overlay"></div>
  <canvas id="c"></canvas>

  <nav>
    <span class="nav-name">Simran Shah</span>
    <div class="hamburger" id="hamburger">
      <span></span><span></span><span></span>
    </div>
    <ul class="nav-links" id="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="dog.html">Pictures of my dog</a></li>
      <li><a href="cv.html">CV</a></li>
      <li><a href="movies.html">Movie reviews</a></li>
      <li><a href="books.html" class="active">books i'm reading</a></li>
      <li><a href="music.html">Music i listen to</a></li>
      <li><a href="contact.html">contact</a></li>
    </ul>
  </nav>

  <div class="container">
    <span class="status" id="status-text">WORK IN PROGRESS</span>
  </div>

  <p class="footer">
    <a href="https://www.linkedin.com/in/simrancs1998/" target="_blank">LinkedIn</a>
  </p>

  <!-- Loading screen JS -->
  <script>
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ@#$%&*';
    const finalText = 'LOADING';
    const scrambleEl = document.getElementById('scramble-text');
    const bar = document.getElementById('loading-bar');
    const screen = document.getElementById('loading-screen');

    let progress = 0;
    const barInterval = setInterval(() => {
      progress = Math.min(progress + Math.random() * 18, 100);
      bar.style.width = progress + '%';
      if (progress >= 100) clearInterval(barInterval);
    }, 80);

    let frame = 0;
    const scrambleInterval = setInterval(() => {
      scrambleEl.textContent = finalText
        .split('')
        .map((char, i) => frame > i * 3 ? char : chars[Math.floor(Math.random() * chars.length)])
        .join('');
      frame++;
      if (frame > finalText.length * 3) {
        scrambleEl.textContent = finalText;
        clearInterval(scrambleInterval);
      }
    }, 40);

    window.addEventListener('load', () => {
      setTimeout(() => {
        bar.style.width = '100%';
        setTimeout(() => {
          screen.classList.add('hide');
          setTimeout(() => screen.remove(), 700);
        }, 300);
      }, 600);
    });

    // ── Status badge scramble ──
    const statusChars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ@#$%&*';
    const statusFinal = 'WORK IN PROGRESS';
    const statusEl = document.getElementById('status-text');
    setTimeout(() => {
      let f = 0;
      const si = setInterval(() => {
        statusEl.textContent = statusFinal
          .split('')
          .map((char, i) => {
            if (char === ' ') return ' ';
            return f > i * 3 ? char : statusChars[Math.floor(Math.random() * statusChars.length)];
          })
          .join('');
        f++;
        if (f > statusFinal.length * 3) {
          statusEl.textContent = statusFinal;
          clearInterval(si);
        }
      }, 40);
    }, 1600);
  </script>

  <script>
    // Hamburger toggle
    const hamburger = document.getElementById('hamburger');
    const navLinks = document.getElementById('nav-links');
    hamburger.addEventListener('click', () => { navLinks.classList.toggle('open'); });

    // Page transitions
    const overlay = document.getElementById('transition-overlay');
    document.querySelectorAll('.nav-links a').forEach(link => {
      link.addEventListener('click', function(e) {
        if (this.classList.contains('active')) return;
        e.preventDefault();
        const href = this.getAttribute('href');
        overlay.classList.add('fade-in');
        setTimeout(() => { window.location.href = href; }, 500);
      });
    });
    window.addEventListener('load', () => { overlay.classList.remove('fade-in'); });

    // Canvas animation
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let W, H;
    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    function rf(a, b) { return Math.random() * (b - a) + a; }
    let flies = [];
    function initFlies() {
      flies = [];
      for (let i = 0; i < 35; i++) {
        flies.push({ x: rf(0,W), y: rf(H*0.2,H*0.85), vx: rf(-0.3,0.3), vy: rf(-0.25,-0.04), alpha: rf(0.1,0.8), dir: Math.random()>0.5?1:-1, spd: rf(0.005,0.018), col: Math.random()>0.5?'#c0b455':'#86b084' });
      }
    }
    function draw() {
      ctx.clearRect(0,0,W,H);
      flies.forEach(f => {
        f.x+=f.vx; f.y+=f.vy; f.alpha+=f.dir*f.spd;
        if(f.alpha>0.9) f.dir=-1; if(f.alpha<0.05) f.dir=1;
        if(f.y<H*0.1){f.y=H*0.85;f.x=rf(0,W);} if(f.x<-10||f.x>W+10) f.x=rf(0,W);
        ctx.save(); ctx.globalAlpha=f.alpha; ctx.fillStyle=f.col;
        ctx.beginPath(); ctx.arc(f.x,f.y,1.8,0,Math.PI*2); ctx.fill(); ctx.restore();
      });
      requestAnimationFrame(draw);
    }
    resize(); initFlies(); draw();
    window.addEventListener('resize', () => { resize(); initFlies(); });
  </script>
</body>
</html>
