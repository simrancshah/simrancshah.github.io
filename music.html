<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>simran shah — music i listen to</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Press Start 2P', monospace;
      background-image: url('bg.jpeg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.3);
      z-index: 0;
    }
    canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 1;
    }
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      background: rgba(21, 34, 33, 0.78);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-top: 1px solid rgba(203, 216, 155, 0.25);
      border-bottom: 1px solid rgba(203, 216, 155, 0.25);
      padding: 0 2rem;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-name {
      font-size: 0.45rem;
      letter-spacing: 0.18em;
      color: #c0b455;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }
    .nav-links a {
      font-size: 0.42rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #cbd89b;
      text-decoration: none;
      position: relative;
      padding-bottom: 3px;
      transition: color 0.3s ease;
    }
    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0;
      width: 0%;
      height: 1px;
      background: #c0b455;
      transition: width 0.35s ease;
    }
    .nav-links a:hover { color: #c0b455; }
    .nav-links a:hover::after { width: 100%; }
    .nav-links a.active { color: #c0b455; }
    .nav-links a.active::after { width: 100%; background: #c0b455; opacity: 0.5; }
    .container {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 100;
      text-align: center;
    }
    .status {
      display: inline-block;
      font-size: 0.6rem;
      color: #c0b455;
      padding: 0.6rem 1.2rem;
      border: 2px solid #c0b455;
      box-shadow: 4px 4px 0px #7c7938, -2px -2px 0px #86b084;
      letter-spacing: 0.12em;
      animation: flicker 4s step-end infinite;
    }
    @keyframes flicker {
      0%,94%,100% { opacity:1; }
      95% { opacity:0.3; }
      97% { opacity:1; }
      98% { opacity:0.2; }
      99% { opacity:1; }
    }
    .footer {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.42rem;
      letter-spacing: 0.1em;
      color: #5c896b;
      z-index: 100;
    }
    .footer a { color: #cbd89b; text-decoration: none; transition: color 0.3s; }
    .footer a:hover { color: #c0b455; }
    #transition-overlay {
      position: fixed;
      inset: 0;
      background: #0d1a14;
      z-index: 999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }
    #transition-overlay.fade-in { opacity: 1; pointer-events: all; }
  </style>
</head>
<body>
  <div id="transition-overlay"></div>
  <canvas id="c"></canvas>
  <nav>
    <span class="nav-name">Simran Shah</span>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="dog.html">Pictures of my dog</a></li>
      <li><a href="cv.html">CV</a></li>
      <li><a href="movies.html">Movie reviews</a></li>
      <li><a href="books.html">Books i'm reading</a></li>
      <li><a href="music.html"class="active">Music i listen to</a></li>
    </ul>
  </nav>
  <div class="container">
    <span class="status">WORK IN PROGRESS</span>
  </div>
  <p class="footer">
    <a href="https://www.linkedin.com/in/simrancs1998/" target="_blank">LinkedIn</a>
  </p>
  <script>
    const overlay = document.getElementById('transition-overlay');
    document.querySelectorAll('.nav-links a').forEach(link => {
      link.addEventListener('click', function(e) {
        if (this.classList.contains('active')) return;
        e.preventDefault();
        const href = this.getAttribute('href');
        overlay.classList.add('fade-in');
        setTimeout(() => { window.location.href = href; }, 500);
      });
    });
    window.addEventListener('load', () => { overlay.classList.remove('fade-in'); });
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let W, H;
    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    function rf(a, b) { return Math.random() * (b - a) + a; }
    let flies = [];
    function initFlies() {
      flies = [];
      for (let i = 0; i < 35; i++) {
        flies.push({ x: rf(0,W), y: rf(H*0.2,H*0.85), vx: rf(-0.3,0.3), vy: rf(-0.25,-0.04), alpha: rf(0.1,0.8), dir: Math.random()>0.5?1:-1, spd: rf(0.005,0.018), col: Math.random()>0.5?'#c0b455':'#86b084' });
      }
    }
    function draw() {
      ctx.clearRect(0,0,W,H);
      flies.forEach(f => {
        f.x+=f.vx; f.y+=f.vy; f.alpha+=f.dir*f.spd;
        if(f.alpha>0.9) f.dir=-1; if(f.alpha<0.05) f.dir=1;
        if(f.y<H*0.1){f.y=H*0.85;f.x=rf(0,W);} if(f.x<-10||f.x>W+10) f.x=rf(0,W);
        ctx.save(); ctx.globalAlpha=f.alpha; ctx.fillStyle=f.col;
        ctx.beginPath(); ctx.arc(f.x,f.y,1.8,0,Math.PI*2); ctx.fill(); ctx.restore();
      });
      requestAnimationFrame(draw);
    }
    resize(); initFlies(); draw();
    window.addEventListener('resize', () => { resize(); initFlies(); });
  </script>
</body>
</html>
