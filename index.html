<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>simran shah — work in progress</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a1210;
      overflow: hidden;
      font-family: 'Press Start 2P', monospace;
    }

    canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
    }

    .status {
      display: inline-block;
      font-size: 0.6rem;
      color: #cbbb54;
      padding: 0.6rem 1.2rem;
      border: 2px solid #cbbb54;
      box-shadow: 4px 4px 0px #616536, -2px -2px 0px #8e914e;
      letter-spacing: 0.12em;
      animation: flicker 4s step-end infinite;
    }

    @keyframes flicker {
      0%,94%,100% { opacity:1; }
      95% { opacity:0.3; }
      97% { opacity:1; }
      98% { opacity:0.2; }
      99% { opacity:1; }
    }

    .footer {
      position: fixed;
      bottom: 1.5rem;
      font-size: 0.45rem;
      letter-spacing: 0.1em;
      color: #558166;
      z-index: 1;
    }
    .footer a { color: #72aa83; text-decoration: none; }
    .footer a:hover { color: #cbbb54; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="container">
    <span class="status">WORK IN PROGRESS</span>
  </div>
  <p class="footer">
    <a href="https://www.linkedin.com/in/simrancs1998/" target="_blank">LinkedIn</a>
  </p>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    let W, H;

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    function ri(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }
    function rf(a, b) { return Math.random() * (b - a) + a; }

    let stars = [];
    function initStars() {
      stars = [];
      for (let i = 0; i < 80; i++) {
        stars.push({
          x: rf(0, W), y: rf(0, H * 0.5),
          r: Math.random() > 0.8 ? 1.5 : 0.8,
          phase: rf(0, Math.PI * 2),
          speed: rf(0.01, 0.04)
        });
      }
    }

    let flies = [];
    function initFlies() {
      flies = [];
      for (let i = 0; i < 28; i++) {
        flies.push({
          x: rf(0, W), y: rf(H * 0.4, H * 0.85),
          vx: rf(-0.4, 0.4), vy: rf(-0.3, -0.05),
          alpha: rf(0.1, 0.9),
          dir: Math.random() > 0.5 ? 1 : -1,
          spd: rf(0.005, 0.02),
          col: Math.random() > 0.45 ? '#cbbb54' : '#72aa83'
        });
      }
    }

    function circle(x, y, r, color, alpha) {
      ctx.save();
      ctx.globalAlpha = alpha !== undefined ? alpha : 1;
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function rect(x, y, w, h, color, alpha) {
      ctx.save();
      ctx.globalAlpha = alpha !== undefined ? alpha : 1;
      ctx.fillStyle = color;
      ctx.fillRect(x, y, w, h);
      ctx.restore();
    }

    function drawSky() {
      let grad = ctx.createLinearGradient(0, 0, 0, H);
      grad.addColorStop(0,    '#070f0c');
      grad.addColorStop(0.45, '#0d1a14');
      grad.addColorStop(0.7,  '#192623');
      grad.addColorStop(1,    '#2b3e32');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);
    }

    function drawGlow() {
      let grd = ctx.createRadialGradient(W/2, H*0.55, 0, W/2, H*0.55, W*0.45);
      grd.addColorStop(0,   'rgba(100,160,110,0.13)');
      grd.addColorStop(0.5, 'rgba(60,100,75,0.06)');
      grd.addColorStop(1,   'rgba(0,0,0,0)');
      ctx.fillStyle = grd;
      ctx.fillRect(0, 0, W, H);
    }

    function drawTree(x, baseY, trunkH, trunkW, canopyR, c1, c2, c3) {
      rect(x - trunkW/2, baseY - trunkH, trunkW, trunkH, '#1a1008');
      circle(x, baseY - trunkH, canopyR, c1);
      circle(x - canopyR*0.3, baseY - trunkH - canopyR*0.4, canopyR*0.7, c2);
      circle(x + canopyR*0.25, baseY - trunkH - canopyR*0.5, canopyR*0.65, c2);
      circle(x, baseY - trunkH - canopyR*0.9, canopyR*0.5, c3);
      circle(x, baseY - trunkH - canopyR*1.3, canopyR*0.3, c3);
    }

    function drawBigTree(x, baseY, trunkW, trunkH, canopyR) {
      let tgrad = ctx.createLinearGradient(x - trunkW/2, 0, x + trunkW/2, 0);
      tgrad.addColorStop(0,   '#0d0905');
      tgrad.addColorStop(0.3, '#1a1008');
      tgrad.addColorStop(0.7, '#2a1a0e');
      tgrad.addColorStop(1,   '#1a1008');
      ctx.fillStyle = tgrad;
      ctx.fillRect(x - trunkW/2, baseY - trunkH, trunkW, trunkH);

      for (let i = 0; i < 6; i++) {
        rect(x - trunkW/2 - i*3, baseY - (6-i)*4, 3, (6-i)*4, '#1a1008');
        rect(x + trunkW/2 + i*3 - 3, baseY - (6-i)*4, 3, (6-i)*4, '#1a1008');
      }

      for (let i = -trunkW/2; i < trunkW/2; i += 4) {
        const tlen = ri(6, 18);
        const ty = baseY - trunkH + trunkH * 0.35 + Math.sin(i * 0.5) * 8;
        rect(x + i, ty, 1, tlen, '#2b3e32');
      }

      circle(x, baseY - trunkH - canopyR*0.1, canopyR,          '#192623');
      circle(x - canopyR*0.5, baseY - trunkH - canopyR*0.5,  canopyR*0.8,  '#2b3e32');
      circle(x + canopyR*0.4, baseY - trunkH - canopyR*0.55, canopyR*0.75, '#2b3e32');
      circle(x - canopyR*0.2, baseY - trunkH - canopyR*0.9,  canopyR*0.6,  '#385c4b');
      circle(x + canopyR*0.2, baseY - trunkH - canopyR*1.0,  canopyR*0.55, '#385c4b');
      circle(x,               baseY - trunkH - canopyR*1.3,  canopyR*0.4,  '#558166');
      circle(x,               baseY - trunkH - canopyR*1.55, canopyR*0.25, '#72aa83');
    }

    function drawSpires(cx, baseY) {
      ctx.save();
      ctx.globalAlpha = 0.35;
      const spires = [
        {x: cx-14, h: 38, w: 5},
        {x: cx-5,  h: 52, w: 7},
        {x: cx+5,  h: 42, w: 5},
        {x: cx+13, h: 30, w: 4},
      ];
      spires.forEach(s => {
        rect(s.x, baseY - s.h, s.w, s.h, '#2b3e32');
        ctx.fillStyle = '#2b3e32';
        ctx.beginPath();
        ctx.moveTo(s.x, baseY - s.h);
        ctx.lineTo(s.x + s.w/2, baseY - s.h - 12);
        ctx.lineTo(s.x + s.w, baseY - s.h);
        ctx.fill();
        rect(s.x + 1, baseY - s.h*0.55, 2, 5, '#0a1210');
      });
      ctx.strokeStyle = '#2b3e32';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(cx - 14, baseY - 20);
      ctx.quadraticCurveTo(cx, baseY - 32, cx + 17, baseY - 20);
      ctx.stroke();
      ctx.restore();
    }

    function drawRoad(groundY) {
      const vanishX = W / 2;
      const vanishY = groundY * 0.65;
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(vanishX - 2, vanishY);
      ctx.lineTo(vanishX + 2, vanishY);
      ctx.lineTo(W * 0.72, groundY);
      ctx.lineTo(W * 0.28, groundY);
      ctx.closePath();
      let rgrad = ctx.createLinearGradient(0, vanishY, 0, groundY);
      rgrad.addColorStop(0,   '#1a1008');
      rgrad.addColorStop(0.5, '#2a1a0e');
      rgrad.addColorStop(1,   '#3d2510');
      ctx.fillStyle = rgrad;
      ctx.fill();
      ctx.globalAlpha = 0.25;
      ctx.fillStyle = '#1a2820';
      ctx.beginPath();
      ctx.ellipse(W/2, groundY - 10, W*0.08, 5, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }

    function drawGround(groundY) {
      let ggrad = ctx.createLinearGradient(0, groundY, 0, H);
      ggrad.addColorStop(0, '#192623');
      ggrad.addColorStop(1, '#0d1a14');
      ctx.fillStyle = ggrad;
      ctx.fillRect(0, groundY, W, H - groundY);
      ctx.fillStyle = '#385c4b';
      for (let x = 0; x < W; x += 3) {
        const gh = 3 + Math.abs(Math.sin(x * 0.4)) * 5;
        ctx.fillRect(x, groundY - gh, 2, gh);
      }
      ctx.fillStyle = '#558166';
      for (let x = 1; x < W; x += 5) {
        const gh = 2 + Math.abs(Math.cos(x * 0.6)) * 3;
        ctx.fillRect(x, groundY - gh, 1, gh);
      }
    }

    function drawFigures(groundY) {
      const scale = H / 400;
      const f1x = W * 0.42;
      const f2x = W * 0.48;
      const fH  = 28 * scale;

      ctx.fillStyle = '#1a0e06';
      ctx.beginPath();
      ctx.ellipse(f1x, groundY - fH*0.85, fH*0.13, fH*0.15, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(f1x - fH*0.22, groundY - fH*0.72);
      ctx.lineTo(f1x + fH*0.22, groundY - fH*0.72);
      ctx.lineTo(f1x + fH*0.28, groundY);
      ctx.lineTo(f1x - fH*0.3,  groundY);
      ctx.closePath();
      ctx.fillStyle = '#1a0e06';
      ctx.fill();
      ctx.strokeStyle = '#2a1a0e';
      ctx.lineWidth = 1;
      ctx.stroke();

      ctx.fillStyle = '#2a1a0e';
      ctx.beginPath();
      ctx.ellipse(f2x, groundY - fH*0.9, fH*0.12, fH*0.14, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#5a6e60';
      ctx.fillRect(f2x - fH*0.07, groundY - fH*0.95, fH*0.14, fH*0.06);
      ctx.fillStyle = '#3d2510';
      ctx.beginPath();
      ctx.moveTo(f2x - fH*0.18, groundY - fH*0.76);
      ctx.lineTo(f2x + fH*0.2,  groundY - fH*0.76);
      ctx.lineTo(f2x + fH*0.25, groundY);
      ctx.lineTo(f2x - fH*0.26, groundY);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#4d3520';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    function drawOverhang() {
      circle(0,       0,       W*0.14, '#192623');
      circle(W*0.07,  H*0.04,  W*0.12, '#2b3e32');
      circle(W*0.12,  H*0.02,  W*0.09, '#385c4b');
      circle(W*0.16,  H*0.07,  W*0.07, '#558166');
      circle(W,       0,       W*0.14, '#192623');
      circle(W*0.93,  H*0.04,  W*0.12, '#2b3e32');
      circle(W*0.88,  H*0.02,  W*0.09, '#385c4b');
      circle(W*0.84,  H*0.07,  W*0.07, '#558166');
    }

    let t = 0;

    function draw() {
      const groundY = H * 0.72;

      drawSky();
      drawGlow();

      stars.forEach(s => {
        s.phase += s.speed;
        const alpha = 0.3 + 0.5 * Math.sin(s.phase);
        circle(s.x, s.y, s.r, '#d6dfa1', alpha);
      });

      drawSpires(W * 0.5, groundY * 0.9);
      drawRoad(groundY);

      drawTree(W*0.2,  groundY, 60, 5, 20, '#192623', '#2b3e32', '#385c4b');
      drawTree(W*0.3,  groundY, 50, 4, 16, '#2b3e32', '#385c4b', '#558166');
      drawTree(W*0.65, groundY, 55, 4, 18, '#192623', '#2b3e32', '#385c4b');
      drawTree(W*0.75, groundY, 45, 4, 15, '#2b3e32', '#385c4b', '#558166');

      drawGround(groundY);
      drawFigures(groundY);

      drawBigTree(-W*0.04, groundY, W*0.1,  H*0.75, H*0.32);
      drawBigTree(W*1.04,  groundY, W*0.12, H*0.8,  H*0.38);

      drawOverhang();

      flies.forEach(f => {
        f.x += f.vx; f.y += f.vy;
        f.alpha += f.dir * f.spd;
        if (f.alpha > 0.95) f.dir = -1;
        if (f.alpha < 0.05) f.dir = 1;
        if (f.y < groundY * 0.3) { f.y = groundY - 10; f.x = rf(0, W); }
        if (f.x < -10 || f.x > W + 10) f.x = rf(0, W);
        circle(f.x, f.y, 1.5, f.col, f.alpha);
      });

      t++;
      requestAnimationFrame(draw);
    }

    resize();
    initStars();
    initFlies();
    draw();

    window.addEventListener('resize', () => {
      resize();
      initStars();
      initFlies();
    });
  </script>
</body>
</html>
