'''<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>simran shah — work in progress</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      image-rendering: pixelated;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #1e2b26;
      color: #d7dfa2;
      overflow: hidden;
      position: relative;
      font-family: 'Press Start 2P', monospace;
    }

    canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
      image-rendering: pixelated;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }

    .status {
      display: inline-block;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.65rem;
      color: #ccbd56;
      padding: 0.6rem 1.2rem;
      border: 2px solid #ccbd56;
      /* pixel-style box shadow */
      box-shadow: 4px 4px 0px #636838, -2px -2px 0px #90924f;
      letter-spacing: 0.1em;
      animation: flicker 3s step-end infinite;
    }

    @keyframes flicker {
      0%, 95%, 100% { opacity: 1; }
      96% { opacity: 0.4; }
      97% { opacity: 1; }
      98% { opacity: 0.2; }
      99% { opacity: 1; }
    }

    .footer {
      position: fixed;
      bottom: 1.5rem;
      font-size: 0.5rem;
      letter-spacing: 0.1em;
      color: #578468;
      z-index: 1;
      font-family: 'Press Start 2P', monospace;
    }

    .footer a {
      color: #74ab85;
      text-decoration: none;
    }

    .footer a:hover {
      color: #ccbd56;
    }
  </style>
</head>
<body>

  <canvas id="scene"></canvas>

  <div class="container">
    <span class="status">WORK IN PROGRESS</span>
  </div>

  <p class="footer">
    <a href="https://www.linkedin.com/in/simrancs1998/" target="_blank">LinkedIn</a>
  </p>

  <script>
    const canvas = document.getElementById('scene');
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    let W, H;
    const SCALE = 4; // pixel size — everything drawn at 1px = 4px block

    function resize() {
      W = canvas.width = Math.ceil(window.innerWidth / SCALE);
      H = canvas.height = Math.ceil(window.innerHeight / SCALE);
      canvas.style.width = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';
    }

    // ---- Palette ----
    const C = {
      bg:        '#1e2b26',
      darkTree:  '#2f4436',
      midTree:   '#3b604f',
      leaf:      '#578468',
      sage:      '#74ab85',
      lichen:    '#a9c18a',
      paleLeaf:  '#d7dfa2',
      gold:      '#ccbd56',
      oliveBark: '#636838',
      driedMoss: '#90924f',
      moonWhite: '#eef3dc',
      sky1:      '#0f1a14',
      sky2:      '#1e2b26',
      sky3:      '#162218',
    };

    // ---- Stars ----
    let stars = [];
    function initStars() {
      stars = [];
      for (let i = 0; i < 80; i++) {
        stars.push({
          x: Math.floor(Math.random() * W),
          y: Math.floor(Math.random() * (H * 0.45)),
          bright: Math.random() > 0.7,
          twinkle: Math.random() * Math.PI * 2,
          speed: 0.03 + Math.random() * 0.04,
        });
      }
    }

    // ---- Fireflies ----
    let flies = [];
    function initFlies() {
      flies = [];
      for (let i = 0; i < 30; i++) {
        flies.push({
          x: Math.random() * W,
          y: H * 0.4 + Math.random() * H * 0.5,
          vx: (Math.random() - 0.5) * 0.3,
          vy: -0.05 - Math.random() * 0.2,
          alpha: Math.random(),
          alphaDir: Math.random() > 0.5 ? 1 : -1,
          alphaSpeed: 0.01 + Math.random() * 0.03,
          color: Math.random() > 0.4 ? C.gold : C.sage,
        });
      }
    }

    // ---- Draw pixel rect ----
    function pRect(x, y, w, h, color) {
      ctx.fillStyle = color;
      ctx.fillRect(Math.floor(x), Math.floor(y), Math.floor(w), Math.floor(h));
    }

    // ---- Draw moon ----
    function drawMoon() {
      const mx = Math.floor(W * 0.75);
      const my = Math.floor(H * 0.18);
      const r = 7;
      for (let dy = -r; dy <= r; dy++) {
        for (let dx = -r; dx <= r; dx++) {
          if (dx*dx + dy*dy <= r*r) {
            pRect(mx+dx, my+dy, 1, 1, C.moonWhite);
          }
        }
      }
      // crescent shadow
      const ox = 3;
      for (let dy = -r+1; dy <= r-1; dy++) {
        for (let dx = -r+1; dx <= r-1; dx++) {
          if ((dx-ox)*(dx-ox) + dy*dy <= (r-1)*(r-1)) {
            pRect(mx+dx, my+dy, 1, 1, C.sky1);
          }
        }
      }
    }

    // ---- Draw pixel tree ----
    function drawTree(bx, groundY, trunkH, trunkW, layers, leafColor1, leafColor2) {
      // trunk
      pRect(bx - Math.floor(trunkW/2), groundY - trunkH, trunkW, trunkH, C.oliveBark);
      // canopy layers (triangle-ish using rects)
      for (let l = 0; l < layers; l++) {
        const ly = groundY - trunkH - l * 6;
        const lw = (layers - l) * 5 + 4;
        const lh = 7;
        const col = l % 2 === 0 ? leafColor1 : leafColor2;
        pRect(bx - Math.floor(lw/2), ly - lh, lw, lh, col);
      }
    }

    // ---- Draw pixel arch / ruins ----
    function drawArch(cx, baseY, archW, archH, wallH, color, shadowColor) {
      const hw = Math.floor(archW / 2);
      // left pillar
      pRect(cx - hw - 3, baseY - wallH, 4, wallH, color);
      // right pillar
      pRect(cx + hw, baseY - wallH, 4, wallH, color);
      // arch top (approximated with stacked rects)
      const steps = 8;
      for (let i = 0; i <= steps; i++) {
        const angle = Math.PI * (i / steps);
        const ax = Math.floor(cx + (hw + 2) * Math.cos(Math.PI - angle));
        const ay = Math.floor((baseY - wallH) - archH * Math.sin(angle));
        pRect(ax - 2, ay, 4, (baseY - wallH) - ay + 1, color);
      }
      // shadow accent
      pRect(cx - hw - 3, baseY - wallH, 1, wallH, shadowColor);
      pRect(cx + hw + 3, baseY - wallH, 1, wallH, shadowColor);
    }

    // ---- Draw ground / grass tufts ----
    function drawGround(groundY) {
      pRect(0, groundY, W, H - groundY, C.darkTree);
      // grass line
      for (let x = 0; x < W; x += 2) {
        const h = 1 + Math.floor(Math.sin(x * 0.7) + 1);
        pRect(x, groundY - h, 1, h + 1, C.leaf);
      }
      // scattered flowers
      const flowerPositions = [10, 25, 40, 60, 75, 85, 110, 130, 150, 170, 200, 220];
      flowerPositions.forEach(fx => {
        if (fx < W) {
          pRect(fx, groundY - 3, 1, 3, C.midTree);
          pRect(fx - 1, groundY - 4, 3, 2, C.gold);
        }
      });
    }

    // ---- Vines on arch ----
    function drawVines(cx, baseY, archW, archH, wallH) {
      const hw = Math.floor(archW / 2);
      // left pillar vines
      for (let y = baseY - wallH; y < baseY; y += 3) {
        if (Math.sin(y * 0.4) > 0.2) {
          pRect(cx - hw - 2, y, 2, 2, C.leaf);
          if (Math.sin(y * 0.8) > 0.5) pRect(cx - hw - 4, y + 1, 2, 1, C.sage);
        }
      }
      // right pillar vines
      for (let y = baseY - wallH; y < baseY; y += 4) {
        if (Math.cos(y * 0.35) > 0.1) {
          pRect(cx + hw + 1, y, 2, 2, C.midTree);
        }
      }
    }

    let t = 0;

    function drawScene() {
      ctx.clearRect(0, 0, W, H);

      const groundY = Math.floor(H * 0.68);

      // Sky gradient (pixel bands)
      pRect(0, 0, W, H, C.sky1);
      pRect(0, Math.floor(H*0.3), W, Math.floor(H*0.2), C.sky2);
      pRect(0, Math.floor(H*0.5), W, Math.floor(H*0.2), C.bg);

      // Stars
      stars.forEach(s => {
        s.twinkle += s.speed;
        const brightness = 0.5 + 0.5 * Math.sin(s.twinkle);
        if (brightness > 0.4) {
          ctx.fillStyle = s.bright ? C.moonWhite : C.paleLeaf;
          ctx.globalAlpha = brightness;
          ctx.fillRect(s.x, s.y, s.bright ? 2 : 1, s.bright ? 2 : 1);
        }
      });
      ctx.globalAlpha = 1;

      drawMoon();

      // Background trees (dark, distant)
      drawTree(Math.floor(W*0.05), groundY, 22, 3, 3, C.darkTree, C.midTree);
      drawTree(Math.floor(W*0.15), groundY, 18, 2, 2, C.darkTree, C.bg);
      drawTree(Math.floor(W*0.88), groundY, 25, 3, 3, C.darkTree, C.midTree);
      drawTree(Math.floor(W*0.95), groundY, 16, 2, 2, C.bg, C.darkTree);

      // Mid trees
      drawTree(Math.floor(W*0.1), groundY, 30, 3, 4, C.midTree, C.darkTree);
      drawTree(Math.floor(W*0.82), groundY, 28, 3, 4, C.midTree, C.leaf);

      // Arch / ruin (centre)
      const archCX = Math.floor(W / 2);
      drawArch(archCX, groundY, 28, 20, 40, C.driedMoss, C.oliveBark);
      drawVines(archCX, groundY, 28, 20, 40);

      // Foreground trees
      drawTree(Math.floor(W*0.22), groundY, 35, 4, 5, C.leaf, C.midTree);
      drawTree(Math.floor(W*0.78), groundY, 38, 4, 5, C.leaf, C.sage);

      drawGround(groundY);

      // Fireflies
      flies.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.alpha += p.alphaDir * p.alphaSpeed;
        if (p.alpha >= 0.95) p.alphaDir = -1;
        if (p.alpha <= 0.05) p.alphaDir = 1;
        if (p.y < H * 0.3) { p.y = groundY; p.x = Math.random() * W; }
        if (p.x < 0 || p.x > W) p.x = Math.random() * W;
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.alpha;
        ctx.fillRect(Math.floor(p.x), Math.floor(p.y), 2, 2);
      });
      ctx.globalAlpha = 1;

      t++;
      requestAnimationFrame(drawScene);
    }

    resize();
    initStars();
    initFlies();
    drawScene();

    window.addEventListener('resize', () => {
      resize();
      initStars();
      initFlies();
    });
  </script>
</body>
</html>'''
